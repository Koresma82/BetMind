[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Validação automática das SUGESTÕES da IA — 00:10 Lisboa (~23:10 UTC)
[functions.validate-predictions]
  schedule = "10 23 * * *"

# Validação automática das APOSTAS do utilizador — 00:20 Lisboa
[functions.validate-bets-scheduled]
  schedule = "20 23 * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
